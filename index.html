<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q4 Drill 2</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

  body{
    
  background-color: rgb(226, 165, 43);

}

  h1{
    justify-self: center;
    
  }
    .container{

      justify-content: center;
      background-color: rgb(227, 116, 37);
      margin-top: 100px;
      height: 475px;
      width: 900px;
      border: 5px rgb(148, 102, 11);
      border-radius: 15px;
    }

    .btn{
      color: rgb(67, 64, 69);
      background-color :rgb(236, 119, 35);
      margin-top: 15px;

    .text{
      margin-top: 10px;
      margin-bottom: 10px;

    input{
      margin-top: 1px;
    }

  
  </style>
</head>
<body>
<div class="container"> 
  <h1>Heat Index Checker</h1>

  <h3>Note :</h3>
  <p>Input the temperature (°C) and humidity (%), then click Check to see the heat index and its status.</p>

  <br>

  <p class="text">Degree in °C</p>
  <input type="text" id="temp" class="form-control" placeholder="Input degree value">
  <p class="text"> Humidity in %</p>
  <input type="text" id="humid" class="form-control" placeholder="Input percentage value">
  <button class="btn btn-info" onclick="checkHI()">
    Check</button>
  </div>
<script>
  function checkHI(){ 
 var temp = document.getElementById("temp").value;
      var humid = document.getElementById("humid").value;
      var HeatIndex = temp + (0.33 * humid) - 4;
  
      var status = "";
  
      switch(true){
        case (HeatIndex <= 0): //compare
          status = "Please input values";
          break; //How do i change the heat index's value T-T SIRRRRR

        case (HeatIndex <= 27): //compare
          status = "Comfortable / Cool";
          break;
        case (HeatIndex < 33): //compare
          status = "Warm";
          break;
        case (HeatIndex < 38): //compare
          status = "Hot";
          break;
        case (HeatIndex < 42): //compare
          status = "Very Hot / Caution";
          break;
        case (HeatIndex >= 42): //compare
          status = "Extreme Heat / Danger";
          break;
        default:
         status = "Invalid values."; //How do i get heat index to state 0...
      }

      alert("Heat Index : " + HeatIndex.toFixed(1) + "°C " + "\n" + "Status : " + status);
    } 


    </script>
</script>

</body>
</html>
