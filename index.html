<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q4 Drill 2</title>
</head>
<body>
  <h1>Heat Index Checker</h1>

  <p>Degree in °C</p>
  <input type="text" id="temp" class="form-control" placeholder="Input degree value">
  <p> Humidity in %</p>
  <input type="text" id="humid" class="form-control" placeholder="Input percentage value">
  <button class="btn btn-info" onclick="checkHI()">
    Check</button>

<script>
  function checkHI(){ 
 var temp = document.getElementById("temp").value;
      var humid = document.getElementById("humid").value;
      var HeatIndex = temp + (0.33 * humid) - 4;
  
      var status = "";
  
      switch(true){
        case (HeatIndex <= 27): //compare
          status = "Comfortable / Cool";
          break;
        case (HeatIndex < 33): //compare
          status = "Warm";
          break;
        case (HeatIndex < 38): //compare
          status = "Hot";
          break;
        case (HeatIndex < 42): //compare
          status = "Very Hot / Caution";
          break;
        case (HeatIndex >= 42): //compare
          status = "Extreme Heat / Danger";
          break;
        default:
         status = "";
      }

      alert("Heat Index : " + HeatIndex.toFixed(1) + "\n" + "Status : " + status);
    } 


    </script>
</script>

</body>
</html>
